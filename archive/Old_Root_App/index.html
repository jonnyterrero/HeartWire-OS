        .dark ::-webkit-scrollbar-thumb { background: #474C50; }
        
        .nav-active { background-color: #EAEAEA; color: #37352F; font-weight: 600; }
        .dark .nav-active { background-color: #3F4447; color: #FFFFFF; }
        
        #sidebar { transition: transform 0.3s ease-in-out; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); }
        
        /* Project Card Image */
        .project-cover { aspect-ratio: 16/9; object-fit: cover; width: 100%; border-bottom: 1px solid #e5e7eb; }
        .dark .project-cover { border-bottom: 1px solid #373737; }
        
        /* Planner */
        .planner-col { min-height: 100px; }
        .task-card { cursor: grab; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .task-card:active { cursor: grabbing; }

        /* Habit Grid */
        .habit-btn { transition: all 0.2s; }
        .habit-btn.active { background-color: #2eaadc; color: white; border-color: #2eaadc; }

        const App = {
            data: null,
            sidebarOpen: false,
            
            async init() {
                await this.checkVersion();
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        this.data = JSON.parse(stored);
                        this.migrate();
                    } catch(e) { this.hardReset(); }
                } else {
                    this.hardReset();
                }
                this.applyTheme();
                this.renderSidebarTracks();
                this.router('dashboard');
                lucide.createIcons();
            },
            
            async checkVersion() {
                try {
                    // Fetch latest version.json from the repo (raw content)
                    const repoOwner = 'jonnyterrero';
                    const repoName = '5amClub';
                    const branch = 'main';
                    const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/version.json?t=${Date.now()}`;
                    
                    const res = await fetch(url);
                    if(res.ok) {
                        const remote = await res.json();
                        if(remote.version !== CURRENT_VERSION) {
                            document.getElementById('update-toast').style.transform = 'translateY(0)';
                        }
                    }
                } catch(e) { console.error('Update check failed', e); }
            },
            
            migrate() {
                if (this.data.version !== CURRENT_VERSION) {
                    // Data Migration Logic
                    if(!this.data.notes) this.data.notes = [];
                    if(!this.data.habits) this.data.habits = [];

                    // Convert Goals from strings to objects if necessary
                    this.data.courses.forEach(c => {
                        if(c.goals && c.goals.length > 0 && typeof c.goals[0] === 'string') {
                            c.goals = c.goals.map(g => ({ text: g, completed: false }));
                        }
                    });

                    // Merge Seed Data
                    // Tracks
                    const tMap = new Map(this.data.tracks.map(t => [t.id, t]));
                    SEED.tracks.forEach(t => { if(!tMap.has(t.id)) this.data.tracks.push(t); });
                    
                    // Courses
                    const cMap = new Map(this.data.courses.map(c => [c.id, c]));
                    SEED.courses.forEach(c => { if(!cMap.has(c.id)) this.data.courses.push(c); });
                    
                    // Resources
                    const rMap = new Set(this.data.resources.map(r => r.url));
                    SEED.resources.forEach(r => { if(!rMap.has(r.url)) this.data.resources.push(r); });
                    
                    // Projects
                    const pMap = new Set(this.data.projects.map(p => p.title));
                    SEED.projects.forEach(p => { if(!pMap.has(p.title)) this.data.projects.push(p); });
                    
                    this.data.version = CURRENT_VERSION;
                    this.save();
                }
            },
            
            hardReset() {
                this.data = { 
                    ...SEED, 
                    tasks: [], 
                    notes: [], 
                    habits: [],
                    streak: 0, 
                    lastLogin: null, 
                    planner: { mon: [], tue: [], wed: [], thu: [], fri: [], sat: [], sun: [] }, 
                    settings: { darkMode: false } 
                };
                // Ensure minimal data
                if(this.data.tracks.length === 0) this.data.tracks.push({id:'se', name:'Software Engineering', icon:'laptop'});
                    this.save();
                    window.location.reload();
            },
            
            save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); },
            
            toggleSidebar() { 
                this.sidebarOpen = !this.sidebarOpen; 
                const sb=document.getElementById('sidebar'); 
                const ov=document.getElementById('sidebar-overlay'); 
                if(this.sidebarOpen) { sb.classList.remove('-translate-x-full'); ov.classList.remove('hidden'); } 
                else { sb.classList.add('-translate-x-full'); ov.classList.add('hidden'); } 
            },
            
            toggleDarkMode() { this.data.settings.darkMode = !this.data.settings.darkMode; this.applyTheme(); this.save(); },
            applyTheme() { document.documentElement.classList.toggle('dark', this.data.settings.darkMode); },

                const container = document.getElementById('main-container');

                document.querySelectorAll('.nav-item').forEach(el => { 
                    el.classList.remove('nav-active', 'bg-gray-200', 'dark:bg-gray-700'); 
                    el.classList.add('text-gray-600', 'dark:text-gray-400'); 
                });
                const activeId = page.startsWith('db-') ? `nav-${page}` : `nav-${page}`;
                const el = document.getElementById(activeId); if(el) el.classList.add('nav-active');
                
                switch(page) {
                    case 'dashboard': this.renderDashboard(container); break;
                    case 'planner': this.renderPlanner(container); break;
                    case 'notes': this.renderNotesPage(container); break;
                    case 'db-projects': this.renderProjectDB(container); break;
                    case 'db-courses': this.renderCourseDB(container); break;
                    case 'db-resources': this.renderResourceDB(container); break;

                        ` : ''}

                        ${activeTab === 'notes' ? `
                            <div class="flex justify-between items-center mb-4"><h3 class="font-bold dark:text-white">Course Notes</h3><div class="flex gap-2"><button onclick="app.importNotes(${id})" class="text-xs bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">Import</button><button onclick="app.openNoteModal(null, ${id})" class="text-xs bg-primary text-white px-3 py-1.5 rounded">+ New Note</button></div></div>
                            <div class="grid md:grid-cols-2 gap-4">
                                ${cNotes.map(n => `
                                    <div onclick="app.openNoteModal(${n.id}, ${id})" class="bg-white dark:bg-darkSurface p-4 rounded-lg border border-gray-200 dark:border-gray-800 cursor-pointer hover:border-primary">
                                        <h4 class="font-bold dark:text-white mb-1">${n.title}</h4>
                                        <p class="text-xs text-gray-500 line-clamp-2">${n.content}</p>
                                    </div>
                                `).join('')}
                                ${cNotes.length===0 ? '<p class="text-sm text-gray-400 col-span-2">No notes for this course yet.</p>' : ''}
                            </div>
                        ` : ''}
                    </div>
                `; 
            },

            // --- TRACK MANAGEMENT ---
            renderTrackPage(c, id) { 
                const t=this.data.tracks.find(x=>x.id===id); 
                if(!t) return app.router('dashboard');
                const cs=this.data.courses.filter(x=>x.trackId===id); 
                c.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-bold dark:text-white flex items-center gap-3"><i data-lucide="${t.icon}" class="text-primary"></i> ${t.name}</h2>
                        <div class="flex gap-2">
                            <button onclick="app.deleteTrack('${t.id}')" class="text-gray-400 hover:text-red-500 px-3 py-1.5"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            <button onclick="app.openCourseModal('${id}')" class="bg-primary text-white px-3 py-1.5 rounded text-sm flex items-center gap-2"><i data-lucide="plus" class="w-4"></i> Course</button>
                        </div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        ${cs.map(x=>`<div onclick="app.router('course-detail', ${x.id})" class="bg-white dark:bg-darkSurface p-5 rounded-xl border border-gray-200 dark:border-gray-800 cursor-pointer hover:border-primary transition-colors"><h3 class="font-bold text-lg dark:text-white mb-2">${x.title}</h3><div class="w-full bg-gray-100 dark:bg-gray-700 h-1.5 rounded"><div class="bg-primary h-1.5 rounded" style="width:${x.progress}%"></div></div></div>`).join('')}
                        ${cs.length===0 ? '<p class="text-gray-400 col-span-2 py-10 text-center">No courses in this track yet.</p>' : ''}
                    </div>
                `; 
            },

            openTrackModal() {
                const html = `
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold uppercase text-gray-500">Track Name</label><input id="t-name" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" placeholder="e.g. Machine Learning"></div>
                        <div><label class="text-xs font-bold uppercase text-gray-500">Icon (Lucide Name)</label><input id="t-icon" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" placeholder="e.g. brain-circuit" value="folder"></div>
                        <p class="text-xs text-gray-400">You can add courses and resources to this track after creating it.</p>
                    </div>
                `;
                app.openModal('New Track', html, () => {
                    const name = document.getElementById('t-name').value;
                    const icon = document.getElementById('t-icon').value;
                    if(name) {
                        const id = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
                        this.data.tracks.push({ id, name, icon, order: this.data.tracks.length });
                        this.save(); 
                        this.renderSidebarTracks();
                        app.closeModal();
                        app.router('track', id);
                    }
                });
            },

            deleteTrack(id) {
                if(confirm('Are you sure you want to delete this track? This will remove all associated courses and progress. This action cannot be undone.')) {
                    this.data.courses = this.data.courses.filter(c => c.trackId !== id);
                    this.data.resources = this.data.resources.filter(r => r.trackId !== id);
                    this.data.projects = this.data.projects.filter(p => p.trackId !== id);
                    this.data.tracks = this.data.tracks.filter(t => t.id !== id);
                    
                    this.save();
                    this.renderSidebarTracks();
                    this.router('dashboard');
                }
            },

            openCourseModal(trackId) {
                const html = `
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold uppercase text-gray-500">Course Title</label><input id="c-title" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white"></div>
                    </div>
                `;
                app.openModal('New Course', html, () => {
                    const title = document.getElementById('c-title').value;
                    if(title) {
                        this.data.courses.push({ id: Date.now(), trackId, title, status: 'Not Started', progress: 0, goals: [] });
                        this.save(); app.closeModal(); app.router('track', trackId);
                    }
                });
            },

            // --- MODALS & ACTIONS ---
            
            openProjectModal(id=null) {
                const p = id ? this.data.projects.find(x => x.id === id) : { id: Date.now(), title:'', description:'', trackId:'misc', status:'Not Started', difficulty:1, img:'' };
                const html = `
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold uppercase text-gray-500">Title</label><input id="p-title" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" value="${p.title}"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold uppercase text-gray-500">Track</label><select id="p-track" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white">${this.data.tracks.map(t => `<option value="${t.id}" ${t.id===p.trackId?'selected':''}>${t.name}</option>`).join('')}</select></div>
                            <div><label class="text-xs font-bold uppercase text-gray-500">Difficulty (1-3)</label><input type="number" min="1" max="3" id="p-diff" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" value="${p.difficulty||1}"></div>
                        </div>
                        <div><label class="text-xs font-bold uppercase text-gray-500">Status</label><select id="p-status" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white">
                            ${['Not Started', 'In Progress', 'Completed'].map(s => `<option value="${s}" ${s===p.status?'selected':''}>${s}</option>`).join('')}
                        </select></div>
                        <div><label class="text-xs font-bold uppercase text-gray-500">Description</label><textarea id="p-desc" class="w-full h-24 p-2 border rounded dark:bg-gray-800 dark:text-white">${p.description}</textarea></div>
                        <div><label class="text-xs font-bold uppercase text-gray-500">Image URL</label><input id="p-img" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" value="${p.img||''}"></div>
                    </div>
                `;
                app.openModal(id ? 'Edit Project' : 'New Project', html, () => { 
                    p.title=document.getElementById('p-title').value; 
                    p.trackId=document.getElementById('p-track').value;
                    p.difficulty=parseInt(document.getElementById('p-diff').value);
                    p.status=document.getElementById('p-status').value;
                    p.description=document.getElementById('p-desc').value;
                    p.img=document.getElementById('p-img').value;
                    if(!id) this.data.projects.push(p);
                    this.save(); app.closeModal(); app.router('db-projects'); 
                });
            },

            openNoteModal(id=null, courseId=null) {
                const n = id ? this.data.notes.find(x => x.id === id) : { id: Date.now(), title: 'New Note', content: '', date: Date.now(), courseId: courseId };
                const html = `
                    <div class="space-y-4 h-[60vh] flex flex-col">
                        <input id="n-title" class="w-full p-2 text-xl font-bold border-none outline-none dark:bg-[#252525] dark:text-white" value="${n.title}" placeholder="Note Title">
                        <div class="flex-1 flex gap-2 border-t border-gray-200 dark:border-gray-700 pt-2">
                            <textarea id="n-content" class="w-1/2 h-full p-2 resize-none border-none outline-none dark:bg-[#252525] dark:text-gray-300 font-mono text-sm" placeholder="Type markdown here...">${n.content}</textarea>
                            <div id="n-preview" class="w-1/2 h-full p-2 overflow-y-auto prose dark:prose-invert text-sm border-l border-gray-100 dark:border-gray-700"></div>
                        </div>
                    </div>
                `;
                
                app.openModal(id ? 'Edit Note' : 'New Note', html, () => {
                    n.title = document.getElementById('n-title').value;
                    n.content = document.getElementById('n-content').value;
                    n.date = Date.now();
                    if(!id) this.data.notes.push(n);
                    this.save(); 
                    app.closeModal(); 
                    if(courseId) app.router('course-detail', courseId, 'notes');
                    else app.router('notes');
                });
                
                // Live Preview
                const ta = document.getElementById('n-content');
                const pre = document.getElementById('n-preview');
                const updatePre = () => { pre.innerHTML = marked.parse(ta.value); };
                ta.addEventListener('input', updatePre);
                updatePre();
            },
            
            openGoalModal(cid) {
                const co = this.data.courses.find(c => c.id === cid);
                const goalText = co.goals.map(g => g.text).join('\n');
                const html = `
                    <div class="space-y-4">
                        <p class="text-sm text-gray-500">Enter one goal per line. Existing completion status will be reset if edited.</p>
                        <textarea id="g-text" class="w-full h-48 p-2 border rounded dark:bg-gray-800 dark:text-white">${goalText}</textarea>
                    </div>
                `;
                app.openModal('Edit Goals', html, () => {
                    const txt = document.getElementById('g-text').value;
                    const newGoals = txt.split('\n').filter(l => l.trim().length > 0);
                    const oldStatusMap = new Map(co.goals.map(g => [g.text, g.completed]));
                    co.goals = newGoals.map(t => ({ text: t, completed: oldStatusMap.get(t) || false }));
                    co.progress = Math.round((co.goals.filter(g => g.completed).length / co.goals.length) * 100) || 0;
                    this.save(); app.closeModal(); app.router('course-detail', cid, 'goals');
                });
            },

            toggleGoal(courseId, index) {
                const co = this.data.courses.find(c => c.id === courseId);
                if (co && co.goals[index]) {
                    co.goals[index].completed = !co.goals[index].completed;
                    co.progress = Math.round((co.goals.filter(g => g.completed).length / co.goals.length) * 100) || 0;
                    if(co.progress === 100) co.status = 'Completed';
                    else if(co.progress > 0) co.status = 'In Progress';
                    this.save();
                    const activePage = document.querySelector('.nav-active').id;
                    if (activePage.includes('dashboard')) this.router('dashboard');
                    else this.router('course-detail', courseId, 'goals');
                }
            },
            
            openResourceLinker(cid) {
                const trackId = this.data.courses.find(c => c.id === cid).trackId;
                const existing = this.data.resources.filter(r => r.trackId === trackId || r.trackId === 'misc');
                const html = `<div class="space-y-4"><h4 class="text-xs font-bold uppercase text-gray-500">Link Existing</h4><div class="max-h-40 overflow-y-auto border rounded p-2 space-y-1 dark:border-gray-700">${existing.map(r => `<div class="flex items-center gap-2"><input type="checkbox" id="link-${r.id}" ${r.courseId===cid?'checked':''}><label class="text-sm dark:text-white">${r.title}</label></div>`).join('')}</div><h4 class="text-xs font-bold uppercase text-gray-500 pt-2">Or Add New</h4><input id="new-res-title" placeholder="Title" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white"><input id="new-res-url" placeholder="URL" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white"></div>`;
                app.openModal('Add Resource', html, () => {
                    existing.forEach(r => { if(document.getElementById(`link-${r.id}`).checked) r.courseId = cid; });
                    const t = document.getElementById('new-res-title').value, u = document.getElementById('new-res-url').value;
                    if(t && u) this.data.resources.push({id: Date.now(), title: t, url: u, type: 'Web', trackId, courseId: cid});
                    this.save(); app.closeModal(); app.renderCourseDetail(document.getElementById('main-container'), cid);
                });
            },
            
            openResourceModal(id=null) {
                const r = id ? this.data.resources.find(x => x.id === id) : { id: Date.now(), title:'', url:'', type:'Web', trackId:'misc', courseId: null };
                const html = `
                    <div class="space-y-4">
                        <div><label class="text-xs font-bold uppercase text-gray-500">Title</label><input id="r-title" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" value="${r.title}"></div>
                        <div><label class="text-xs font-bold uppercase text-gray-500">URL</label><input id="r-url" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white" value="${r.url}"></div>
                        <div><label class="text-xs font-bold uppercase text-gray-500">Type</label><select id="r-type" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white">
                            ${['Web', 'Video', 'Book', 'Course', 'Repo'].map(t => `<option value="${t}" ${t===r.type?'selected':''}>${t}</option>`).join('')}
                        </select></div>
                    </div>
                `;
                app.openModal(id ? 'Edit Resource' : 'Add Resource', html, () => {
                    r.title = document.getElementById('r-title').value;
                    r.url = document.getElementById('r-url').value;
                    r.type = document.getElementById('r-type').value;
                    if(!id) this.data.resources.push(r);
                    this.save(); app.closeModal(); 
                    const activePage = document.querySelector('.nav-active').id;
                    if(activePage === 'nav-db-resources') this.renderResourceDB(document.getElementById('main-container'));
                    else if(r.courseId) this.router('course-detail', r.courseId);
                });
            },
            
            addHabit() {
                const t = prompt("Habit Title:");
                if(t) {
                    this.data.habits.push({ id: Date.now(), title: t, history: {} });
                    this.save(); this.router('planner');
                }
            },
            
            toggleHabit(id, dayName) {
                const h = this.data.habits.find(x => x.id === id);
                if(h) {
                    if(!h.history) h.history = {};
                    h.history[dayName] = !h.history[dayName];
                    this.save(); this.router('planner');
                }
            },
            
            importNotes(courseId=null) {
                const html = `<div class="space-y-4"><p class="text-sm text-gray-500">Paste content here to create a new note.</p><textarea id="imp-text" class="w-full h-48 p-2 border rounded dark:bg-gray-800 dark:text-white"></textarea></div>`;
                app.openModal('Import Note', html, () => {
                    const content = document.getElementById('imp-text').value;
                    if(content) {
                        this.data.notes.push({ id: Date.now(), title: 'Imported Note', content: content, date: Date.now(), courseId });
                        this.save(); app.closeModal();
                        if(courseId) app.router('course-detail', courseId, 'notes');
                        else app.router('notes');
                    }
                });
            },
            
            deleteNote(id) { if(confirm('Delete note?')) { this.data.notes = this.data.notes.filter(n => n.id !== id); this.save(); this.router('notes'); } },
            deleteCourse(id) { if(confirm('Delete course?')) { this.data.courses = this.data.courses.filter(c => c.id !== id); this.save(); this.router('track', this.data.courses.find(c=>c.id===id)?.trackId || 'se'); } },

            // Helpers
            openModal(t,c,a) { document.getElementById('modalTitle').innerText=t; document.getElementById('modalContent').innerHTML=c; document.getElementById('modalSaveBtn').onclick=a; document.getElementById('genericModal').classList.remove('hidden'); },
            closeModal() { document.getElementById('genericModal').classList.add('hidden'); },
            addTask(day=null) { const t = prompt("Task:"); if(t) { this.data.tasks.push({id: Date.now(), title: t, completed: false, day}); this.save(); this.router('planner'); }},
            toggleTask(id) { const t = this.data.tasks.find(x => x.id == id); if(t) { t.completed = !t.completed; this.save(); const isDash = document.querySelector('#nav-dashboard.nav-active'); isDash ? this.router('dashboard') : this.router('planner'); } },
            renderSidebarTracks() { document.getElementById('track-list-render').innerHTML = this.data.tracks.map(t => `<button onclick="app.router('track', '${t.id}')" class="nav-item w-full flex items-center gap-2 px-2 py-1.5 rounded text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><i data-lucide="${t.icon}" class="w-4 h-4"></i> ${t.name}</button>`).join(''); },
            renderResourceDB(c) { this.data.resources.length ? c.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold dark:text-white">Resources</h2><button onclick="app.openResourceModal()" class="bg-primary text-white px-3 py-1 rounded flex gap-2"><i data-lucide="plus" class="w-4"></i> Add</button></div><div class="space-y-2">${this.data.resources.map(r => `<div class="flex justify-between p-3 bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-800 rounded hover:bg-gray-50 dark:hover:bg-gray-800"><div class="dark:text-white">${r.title} <span class="text-xs text-gray-500 ml-2">${r.type}</span></div><div class="flex gap-2"><a href="${r.url}" target="_blank" class="text-gray-400 hover:text-primary"><i data-lucide="external-link" class="w-4"></i></a><button onclick="app.openResourceModal(${r.id})" class="text-gray-400 hover:text-primary"><i data-lucide="edit-2" class="w-4"></i></button></div></div>`).join('')}</div>` : c.innerHTML='<p>No resources.</p>'; },
            renderCourseDB(c) { c.innerHTML = `<h2 class="text-2xl font-bold dark:text-white mb-4">All Courses</h2><div class="space-y-2">${this.data.courses.map(co => `<div onclick="app.router('course-detail', ${co.id})" class="p-4 bg-white dark:bg-darkSurface border rounded cursor-pointer hover:border-primary dark:text-white">${co.title}</div>`).join('')}</div>`},
            
            htmlTaskItem(t, isCard=false) { return `<div class="flex justify-between items-center p-3 bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-700 rounded shadow-sm mb-2 task-card group" data-id="${t.id}"><span class="text-sm dark:text-gray-200 ${t.completed?'line-through text-gray-400':''}">${t.title}</span><button onclick="app.toggleTask(${t.id})" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-primary"><i data-lucide="${t.completed?'check-circle':'circle'}" class="w-4"></i></button></div>`; },
            htmlProjectCard(p) { return `<div onclick="app.openProjectModal(${p.id})" class="group bg-white dark:bg-darkSurface border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden cursor-pointer hover:shadow-md transition-all flex flex-col h-full"><div class="relative">${p.img ? `<img src="${p.img}" class="project-cover">` : '<div class="aspect-video bg-gray-50 dark:bg-[#252525] flex items-center justify-center text-gray-300"><i data-lucide="image" class="w-8"></i></div>'}<div class="absolute top-2 right-2 bg-black/50 text-white text-xs px-2 py-1 rounded backdrop-blur-sm">Lvl ${p.difficulty||1}</div></div><div class="p-4 flex-1 flex flex-col"><h4 class="font-semibold dark:text-white text-lg mb-1">${p.title}</h4><p class="text-sm text-gray-500 dark:text-gray-400 line-clamp-2 mb-3 flex-1">${p.description}</p><span class="self-start text-xs px-2 py-1 rounded ${p.status==='Completed'?'bg-green-100 text-green-800':'bg-gray-100 text-gray-800'}">${p.status}</span></div></div>`; },
            initChart() { const ctx=document.getElementById('dashChart').getContext('2d'); new Chart(ctx,{type:'doughnut',data:{datasets:[{data:[15,85],backgroundColor:['#2eaadc','#E5E7EB'],borderWidth:0}]},options:{responsive:true,cutout:'75%'}}); }
        };

        window.onload = () => App.init();
        const app = App;
    </script>
</body>
</html>
